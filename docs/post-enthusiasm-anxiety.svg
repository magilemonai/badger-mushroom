<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#E8F0E8"/>
  <!-- Two overlapping circles — enthusiasm and anxiety coexisting -->
  <!-- Enthusiasm circle -->
  <circle cx="160" cy="200" r="100" fill="#4A7C59" opacity="0.15"/>
  <circle cx="160" cy="200" r="100" fill="none" stroke="#4A7C59" stroke-width="2"/>
  <!-- Anxiety circle -->
  <circle cx="240" cy="200" r="100" fill="#C4896E" opacity="0.15"/>
  <circle cx="240" cy="200" r="100" fill="none" stroke="#C4896E" stroke-width="2"/>
  <!-- Overlap region highlight -->
  <clipPath id="clip-left">
    <circle cx="160" cy="200" r="100"/>
  </clipPath>
  <circle cx="240" cy="200" r="100" fill="#2C2C2C" opacity="0.06" clip-path="url(#clip-left)"/>
  <!-- Labels -->
  <text x="120" y="195" text-anchor="middle" font-family="serif" font-size="13" fill="#4A7C59">enthusiasm</text>
  <text x="280" y="195" text-anchor="middle" font-family="serif" font-size="13" fill="#C4896E">anxiety</text>
  <!-- Center label -->
  <text x="200" y="210" text-anchor="middle" font-family="serif" font-size="11" fill="#2C2C2C" font-weight="bold">paying</text>
  <text x="200" y="226" text-anchor="middle" font-family="serif" font-size="11" fill="#2C2C2C" font-weight="bold">attention</text>
  <!-- Radio stations metaphor -->
  <text x="200" y="360" text-anchor="middle" font-family="monospace" font-size="10" fill="#6B6560" opacity="0.6">3-5 companies · 3-5 "radio stations"</text>
</svg>