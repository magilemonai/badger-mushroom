<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#FAF7F2"/>

  <!-- Subtle grid background -->
  <defs>
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="#D6D0C8" opacity="0.4"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#dots)"/>

  <!-- 2023 block — faded, cautious -->
  <rect x="60" y="140" width="200" height="280" rx="16" fill="#E8E3DB" opacity="0.5"/>
  <text x="160" y="185" text-anchor="middle" font-family="monospace" font-size="16" fill="#9E9890" letter-spacing="3">2023</text>
  <line x1="100" y1="210" x2="220" y2="210" stroke="#D6D0C8" stroke-width="1"/>
  <!-- Cautious quote lines -->
  <rect x="90" y="235" width="140" height="6" rx="3" fill="#D6D0C8" opacity="0.6"/>
  <rect x="90" y="255" width="120" height="6" rx="3" fill="#D6D0C8" opacity="0.5"/>
  <rect x="90" y="275" width="135" height="6" rx="3" fill="#D6D0C8" opacity="0.4"/>
  <!-- Skeptic icon — shield -->
  <circle cx="160" cy="345" r="30" fill="none" stroke="#B8B2A8" stroke-width="2" stroke-dasharray="6 4"/>
  <path d="M 148 335 L 160 325 L 172 335 L 172 355 Q 160 365 148 355 Z" fill="none" stroke="#B8B2A8" stroke-width="1.5"/>
  <text x="160" y="400" text-anchor="middle" font-family="serif" font-size="13" fill="#9E9890" font-style="italic">"not quite ready"</text>

  <!-- The pivot arrow — dramatic U-turn -->
  <path d="M 300 300 C 340 300, 380 180, 420 180 C 460 180, 480 300, 500 300" fill="none" stroke="#C4896E" stroke-width="3" stroke-dasharray="8 6" opacity="0.6"/>
  <!-- Arrow head on the pivot -->
  <polygon points="495,290 505,300 495,310" fill="#C4896E" opacity="0.6"/>
  <!-- Pivot label -->
  <text x="400" y="155" text-anchor="middle" font-family="serif" font-size="14" fill="#C4896E" font-style="italic">the speed I underestimated</text>

  <!-- 2026 block — vibrant, active -->
  <rect x="540" y="140" width="200" height="280" rx="16" fill="#4A7C59" opacity="0.08"/>
  <rect x="540" y="140" width="200" height="280" rx="16" fill="none" stroke="#4A7C59" stroke-width="2" opacity="0.4"/>
  <text x="640" y="185" text-anchor="middle" font-family="monospace" font-size="16" fill="#4A7C59" letter-spacing="3" font-weight="bold">2026</text>
  <line x1="580" y1="210" x2="700" y2="210" stroke="#7A9E7E" stroke-width="1"/>
  <!-- Active code/building lines -->
  <rect x="570" y="235" width="80" height="6" rx="3" fill="#7A9E7E" opacity="0.7"/>
  <rect x="660" y="235" width="50" height="6" rx="3" fill="#C4896E" opacity="0.5"/>
  <rect x="570" y="255" width="40" height="6" rx="3" fill="#4A7C59" opacity="0.4"/>
  <rect x="620" y="255" width="90" height="6" rx="3" fill="#7A9E7E" opacity="0.6"/>
  <rect x="570" y="275" width="110" height="6" rx="3" fill="#4A7C59" opacity="0.5"/>
  <!-- Builder icon — terminal cursor -->
  <rect x="610" y="310" width="60" height="45" rx="6" fill="#2C2C2C"/>
  <rect x="618" y="322" width="2" height="12" fill="#7A9E7E">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
  <rect x="624" y="322" width="20" height="3" rx="1.5" fill="#7A9E7E" opacity="0.5"/>
  <rect x="624" y="330" width="30" height="3" rx="1.5" fill="#C4896E" opacity="0.4"/>
  <text x="640" y="400" text-anchor="middle" font-family="serif" font-size="13" fill="#4A7C59" font-style="italic">"building something"</text>

  <!-- Speed lines between the blocks -->
  <line x1="280" y1="240" x2="520" y2="240" stroke="#7A9E7E" stroke-width="1" opacity="0.15"/>
  <line x1="300" y1="260" x2="520" y2="260" stroke="#7A9E7E" stroke-width="1" opacity="0.12"/>
  <line x1="290" y1="350" x2="520" y2="350" stroke="#7A9E7E" stroke-width="1" opacity="0.1"/>

  <!-- Bottom motto -->
  <text x="400" y="500" text-anchor="middle" font-family="serif" font-size="18" fill="#2C2C2C" opacity="0.7">
    strong opinions, loosely held
  </text>
  <line x1="260" y1="515" x2="540" y2="515" stroke="#C4896E" stroke-width="1" opacity="0.3"/>
</svg>