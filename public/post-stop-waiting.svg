<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#FAF7F2"/>

  <!-- Simple concept: a large play/start button — just press go -->

  <!-- Subtle dot grid -->
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.8" fill="#D6D0C8" opacity="0.5"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#dots)"/>

  <!-- Large circle — the button -->
  <circle cx="400" cy="270" r="140" fill="#4A7C59" opacity="0.08"/>
  <circle cx="400" cy="270" r="140" fill="none" stroke="#4A7C59" stroke-width="3"/>

  <!-- Play triangle inside -->
  <polygon points="370,200 370,340 490,270" fill="#4A7C59" opacity="0.85"/>

  <!-- Ripple rings emanating outward -->
  <circle cx="400" cy="270" r="170" fill="none" stroke="#7A9E7E" stroke-width="1.5" opacity="0.3"/>
  <circle cx="400" cy="270" r="200" fill="none" stroke="#7A9E7E" stroke-width="1" opacity="0.2"/>
  <circle cx="400" cy="270" r="230" fill="none" stroke="#7A9E7E" stroke-width="0.75" opacity="0.1"/>

  <!-- Bottom text -->
  <text x="400" y="480" text-anchor="middle" font-family="monospace" font-size="14" fill="#6B6560" letter-spacing="6" opacity="0.5">STOP WAITING</text>
  <text x="400" y="520" text-anchor="middle" font-family="serif" font-size="22" fill="#4A7C59" font-weight="bold">Press start.</text>
</svg>