<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#F0EBE3"/>
  <!-- Bar chart showing perception gap -->
  <!-- Chart area -->
  <line x1="80" y1="60" x2="80" y2="300" stroke="#D6D0C8" stroke-width="1.5"/>
  <line x1="80" y1="300" x2="340" y2="300" stroke="#D6D0C8" stroke-width="1.5"/>
  <!-- Exec perception bar — 82% -->
  <rect x="120" y="96" width="70" height="204" rx="6" fill="#C4896E" opacity="0.7"/>
  <text x="155" y="86" text-anchor="middle" font-family="monospace" font-size="14" fill="#C4896E" font-weight="bold">82%</text>
  <text x="155" y="330" text-anchor="middle" font-family="monospace" font-size="9" fill="#6B6560">Ad execs</text>
  <text x="155" y="342" text-anchor="middle" font-family="monospace" font-size="9" fill="#6B6560">think</text>
  <!-- Actual consumer bar — 45% -->
  <rect x="230" y="188" width="70" height="112" rx="6" fill="#4A7C59" opacity="0.7"/>
  <text x="265" y="178" text-anchor="middle" font-family="monospace" font-size="14" fill="#4A7C59" font-weight="bold">45%</text>
  <text x="265" y="330" text-anchor="middle" font-family="monospace" font-size="9" fill="#6B6560">Consumers</text>
  <text x="265" y="342" text-anchor="middle" font-family="monospace" font-size="9" fill="#6B6560">actually feel</text>
  <!-- Gap arrow -->
  <line x1="340" y1="96" x2="340" y2="188" stroke="#C4896E" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="355" y="148" font-family="serif" font-size="11" fill="#C4896E" font-style="italic">gap</text>
  <!-- Title -->
  <text x="200" y="385" text-anchor="middle" font-family="serif" font-size="12" fill="#6B6560" font-style="italic">"The filter isn't rejecting AI. It's rejecting lazy."</text>
</svg>