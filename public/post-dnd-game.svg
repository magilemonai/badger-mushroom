<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#2C2C2C"/>
  <!-- Pixel grid background -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="none" stroke="#3a3a3a" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="400" height="400" fill="url(#grid)"/>
  <!-- Ground tiles -->
  <rect x="0" y="280" width="400" height="120" fill="#4A7C59" opacity="0.3"/>
  <rect x="0" y="280" width="400" height="4" fill="#7A9E7E" opacity="0.4"/>
  <!-- Castle/structure -->
  <rect x="140" y="120" width="120" height="160" fill="#6B6560" opacity="0.6"/>
  <rect x="130" y="100" width="20" height="180" fill="#6B6560" opacity="0.7"/>
  <rect x="250" y="100" width="20" height="180" fill="#6B6560" opacity="0.7"/>
  <rect x="130" y="90" width="20" height="20" fill="#C4896E" opacity="0.6"/>
  <rect x="250" y="90" width="20" height="20" fill="#C4896E" opacity="0.6"/>
  <!-- Door -->
  <rect x="180" y="220" width="40" height="60" rx="20" fill="#2C2C2C"/>
  <!-- Windows -->
  <rect x="160" y="150" width="20" height="20" fill="#E8F0E8" opacity="0.3"/>
  <rect x="220" y="150" width="20" height="20" fill="#E8F0E8" opacity="0.3"/>
  <!-- Character (pixel art style) -->
  <rect x="190" y="310" width="20" height="20" fill="#C4896E"/>
  <rect x="190" y="330" width="20" height="24" fill="#4A7C59"/>
  <rect x="186" y="354" width="10" height="10" fill="#6B6560"/>
  <rect x="204" y="354" width="10" height="10" fill="#6B6560"/>
  <!-- Sword -->
  <rect x="212" y="300" width="4" height="30" fill="#D6D0C8"/>
  <rect x="208" y="326" width="12" height="4" fill="#C4896E"/>
  <!-- Stars -->
  <circle cx="80" cy="60" r="2" fill="#E8F0E8" opacity="0.6"/>
  <circle cx="320" cy="40" r="2" fill="#E8F0E8" opacity="0.5"/>
  <circle cx="50" cy="140" r="1.5" fill="#E8F0E8" opacity="0.4"/>
  <circle cx="350" cy="160" r="1.5" fill="#E8F0E8" opacity="0.4"/>
  <circle cx="290" cy="70" r="2" fill="#E8F0E8" opacity="0.3"/>
  <!-- Title -->
  <text x="200" y="50" text-anchor="middle" font-family="monospace" font-size="14" fill="#7A9E7E" letter-spacing="4" opacity="0.8">VALISAR</text>
</svg>